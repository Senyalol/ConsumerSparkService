spring:
  application:
    name: analyticsService

  datasource:
    url: jdbc:postgresql://localhost:5431/userSegmentsDB
    username: postgres
    password: 1111
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    schemas: public
    default-schema: public
    validate-on-migrate: true

  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate

  session:
    store-type: jdbc

server:
  port: 8080

logging:
  level:
    org.flywaydb: INFO
    org.springframework.boot: INFO